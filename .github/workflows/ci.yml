name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go test ./...
      - run: go build ./cmd/repoguard ./cmd/api ./cmd/mcp
      - run: go run ./cmd/repoguard -path samples/demo -format sarif -fail-on none > repoguard.sarif
