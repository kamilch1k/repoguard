name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Build
        run: |
          go build -o bin/repoguard ./cmd/repoguard
          go build -o bin/repoguard-api ./cmd/api
      - name: Exercise demo scan
        run: ./bin/repoguard -path samples/demo -fail-on none
